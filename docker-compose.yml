# =============================================================================
# PRIVOD NEXT -- Development Docker Compose
# Separate infrastructure, does NOT touch Odoo containers/volumes
# =============================================================================
#
# Usage:
#   docker compose up -d                    Start all services
#   docker compose up -d db redis           Start infra only (for local dev)
#   docker compose logs -f backend          Tail backend logs
#   docker compose exec db psql -U privod -d privod2  Open psql shell
#
# Ports:
#   15432 - PostgreSQL
#   16379 - Redis
#   18080 - Backend (Spring Boot)
#   13000 - Frontend (Vite dev server)
#   19000 - MinIO API
#   19001 - MinIO Console
#   11025 - MailHog SMTP
#   18025 - MailHog Web UI
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 -- primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: privod_next_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: privod2
      POSTGRES_USER: privod
      POSTGRES_PASSWORD: privod_dev
      PGDATA: /var/lib/postgresql/data/pgdata
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
    ports:
      - "15432:5432"
    volumes:
      - privod_next_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-extensions.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privod -d privod2"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=200"
    networks:
      - privod_next

  # ---------------------------------------------------------------------------
  # Redis 7 -- caching, sessions, pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: privod_next_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
    ports:
      - "16379:6379"
    volumes:
      - privod_next_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - privod_next

  # ---------------------------------------------------------------------------
  # Backend -- Java 21 / Spring Boot 3.4 (pre-built JAR)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: privod_next_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Datasource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/privod2
      SPRING_DATASOURCE_USERNAME: privod
      SPRING_DATASOURCE_PASSWORD: privod_dev
      # JPA / Hibernate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # JWT
      APP_JWT_SECRET: "${JWT_SECRET:-xk8Pq2mN7vR4tY9wA3cF6hJ0lBnE5sG8dI1oU4zK7mX2pQ9rT6yW3aD0fH5jL}"
      APP_JWT_EXPIRATION_MS: 86400000
      # MinIO / S3
      APP_STORAGE_ENDPOINT: http://minio:9000
      APP_STORAGE_ACCESS_KEY: minio
      APP_STORAGE_SECRET_KEY: minio_dev
      APP_STORAGE_BUCKET: privod-uploads
      # AI Assistant
      APP_AI_API_KEY: "${AI_API_KEY:-}"
      APP_AI_PROVIDER: "${AI_PROVIDER:-openai}"
      APP_AI_MODEL: "${AI_MODEL:-gpt-4o-mini}"
      # Mail (MailHog)
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
      # JVM (dev-safe memory profile to avoid OOM kills on laptops)
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:+UseG1GC -XX:+UseStringDeduplication -XX:MaxMetaspaceSize=256m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "18080:8080"
      - "15005:5005"   # Remote debug port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - privod_next

  # ---------------------------------------------------------------------------
  # Frontend -- React 19 / Vite 6 dev server with HMR
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: privod_next_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:18080
      # Vite dev proxy target inside Docker network
      BACKEND_URL: http://backend:8080
      VITE_WS_URL: http://backend:8080
      NODE_ENV: development
    ports:
      - "13000:3000"
    volumes:
      - ./frontend:/app
      - privod_next_frontend_node_modules:/app/node_modules
    networks:
      - privod_next

  # ---------------------------------------------------------------------------
  # MinIO -- S3-compatible object storage for file uploads
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: privod_next_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # Web Console
    volumes:
      - privod_next_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - privod_next

  # ---------------------------------------------------------------------------
  # MinIO Client -- creates default bucket on startup
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: privod_next_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set privod http://minio:9000 minio minio_dev;
      mc mb --ignore-existing privod/privod-uploads;
      mc anonymous set download privod/privod-uploads/public;
      echo 'MinIO bucket initialized';
      exit 0;
      "
    networks:
      - privod_next

  # ---------------------------------------------------------------------------
  # MailHog -- email testing (catches all outbound email)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: privod_next_mailhog
    restart: unless-stopped
    ports:
      - "11025:1025"   # SMTP
      - "18025:8025"   # Web UI
    environment:
      MH_STORAGE: memory
      MH_SMTP_BIND_ADDR: 0.0.0.0:1025
      MH_UI_BIND_ADDR: 0.0.0.0:8025
    networks:
      - privod_next

# =============================================================================
# Volumes
# =============================================================================
volumes:
  privod_next_pgdata:
    name: privod_next_pgdata
  privod_next_redis:
    name: privod_next_redis
  privod_next_minio:
    name: privod_next_minio
  privod_next_frontend_node_modules:
    name: privod_next_frontend_node_modules

# =============================================================================
# Networks
# =============================================================================
networks:
  privod_next:
    name: privod_next
    driver: bridge
