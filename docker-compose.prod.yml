# =============================================================================
# PRIVOD NEXT -- Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================================
#
# Prerequisites:
#   - Create .env.prod with production secrets
#   - Configure SSL certificates in ./nginx/certs/
#   - Set proper DNS for server_name in nginx config
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 -- production database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: privod_prod_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-privod2}
      POSTGRES_USER: ${POSTGRES_USER:-privod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - privod_prod_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-extensions.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-privod} -d ${POSTGRES_DB:-privod2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - privod_prod

  # ---------------------------------------------------------------------------
  # Redis 7 -- caching and sessions
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: privod_prod_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - privod_prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - privod_prod

  # ---------------------------------------------------------------------------
  # Backend -- Java 21 / Spring Boot (production build)
  # ---------------------------------------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/frowln/erpsystem/backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: privod_prod_backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Datasource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-privod2}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-privod}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      # JWT
      APP_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # MinIO / S3
      APP_STORAGE_ENDPOINT: http://minio:9000
      APP_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      APP_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      APP_STORAGE_BUCKET: ${MINIO_BUCKET:-privod-uploads}
      # Mail
      SPRING_MAIL_HOST: ${MAIL_HOST:?MAIL_HOST must be set}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      # JVM (production-tuned)
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+UseZGC
        -XX:+ZGenerational
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.jmx.enabled=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    networks:
      - privod_prod

  # ---------------------------------------------------------------------------
  # Frontend -- React production build served by Nginx
  # ---------------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/frowln/erpsystem/frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: privod_prod_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - privod_prod

  # ---------------------------------------------------------------------------
  # MinIO -- S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: privod_prod_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    command: server /data --console-address ":9001"
    volumes:
      - privod_prod_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - privod_prod

  # ---------------------------------------------------------------------------
  # MinIO Init -- create default bucket
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: privod_prod_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set privod http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing privod/${MINIO_BUCKET:-privod-uploads};
      echo 'MinIO bucket initialized';
      exit 0;
      "
    networks:
      - privod_prod

  # ---------------------------------------------------------------------------
  # Nginx -- reverse proxy (production entry point)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: privod_prod_nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - privod_prod

# =============================================================================
# Volumes (named, persistent)
# =============================================================================
volumes:
  privod_prod_pgdata:
    name: privod_prod_pgdata
  privod_prod_redis:
    name: privod_prod_redis
  privod_prod_minio:
    name: privod_prod_minio

# =============================================================================
# Networks (isolated production network)
# =============================================================================
networks:
  privod_prod:
    name: privod_prod
    driver: bridge
