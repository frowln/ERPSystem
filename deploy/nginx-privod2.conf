# Privod2 ERP — reverse proxy on host nginx
# Proxies to Docker containers: frontend :3002, backend :8082

server {
    listen 80;
    server_name privod.kpipro.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name privod.kpipro.online;

    ssl_certificate /etc/letsencrypt/live/privod.kpipro.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/privod.kpipro.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # -------------------------------------------------------------------
    # Gzip compression (host-level, supplements container-level)
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm
        application/manifest+json;

    client_max_body_size 5G;

    # -------------------------------------------------------------------
    # Backend API — no caching
    # -------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API
        add_header Cache-Control "no-store";

        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;
        if ($request_method = 'OPTIONS') { return 204; }

        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Large uploads
        client_max_body_size 5G;
    }

    # -------------------------------------------------------------------
    # WebSocket
    # -------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # -------------------------------------------------------------------
    # Static assets with hashed filenames — cache 1 year
    # -------------------------------------------------------------------
    location /assets/ {
        proxy_pass http://127.0.0.1:3002;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------
    # JS/CSS/font files — cache 1 year (Vite content-hashes)
    # -------------------------------------------------------------------
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot|otf)$ {
        proxy_pass http://127.0.0.1:3002;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------
    # Images — cache 30 days
    # -------------------------------------------------------------------
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        proxy_pass http://127.0.0.1:3002;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------------------
    # Service worker — never cache
    # -------------------------------------------------------------------
    location /sw.js {
        proxy_pass http://127.0.0.1:3002;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # -------------------------------------------------------------------
    # PWA manifest — short cache
    # -------------------------------------------------------------------
    location /manifest.json {
        proxy_pass http://127.0.0.1:3002;
        add_header Cache-Control "no-cache";
    }

    # -------------------------------------------------------------------
    # Frontend SPA — no-cache for HTML
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header Cache-Control "no-cache";
    }
}
