<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Привод — Нет подключения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb; color: #374151; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; padding: 24px;
    }
    .container { text-align: center; max-width: 400px; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 24px; background: #2563eb;
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    p { font-size: 14px; line-height: 1.6; color: #6b7280; margin-bottom: 24px; }
    button {
      padding: 10px 24px; font-size: 14px; font-weight: 600; color: #fff;
      background: #2563eb; border: none; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
        <path d="M8 22V12l8-5 8 5v10l-8 5-8-5z" stroke="white" stroke-width="2" stroke-linejoin="round" fill="none"/>
        <path d="M16 17v-5" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="12" r="1.5" fill="white"/>
      </svg>
    </div>
    <h1>Нет подключения</h1>
    <p>Не удалось подключиться к серверу. Проверьте интернет-соединение и попробуйте снова.</p>
    <button onclick="window.location.reload()">Повторить</button>
  </div>
</body>
</html>
