server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm;

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------
    # Max upload size (for file uploads proxied through frontend)
    # -------------------------------------------------------------------
    client_max_body_size 50M;

    # -------------------------------------------------------------------
    # Cache static assets aggressively (Vite hashes filenames)
    # -------------------------------------------------------------------
    location ~* \.(?:css|js|mjs|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------
    # Proxy API requests to the backend service
    # -------------------------------------------------------------------
    location /api/ {
        proxy_pass http://privod_next_backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # Streaming support
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # -------------------------------------------------------------------
    # Proxy Actuator endpoints (internal use)
    # -------------------------------------------------------------------
    location /actuator/ {
        proxy_pass http://privod_next_backend:8080;
        proxy_set_header Host $host;

        # Restrict to internal networks only
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
    }

    # -------------------------------------------------------------------
    # Proxy Swagger / OpenAPI docs
    # -------------------------------------------------------------------
    location /swagger-ui/ {
        proxy_pass http://privod_next_backend:8080;
        proxy_set_header Host $host;
    }

    location /api-docs {
        proxy_pass http://privod_next_backend:8080;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://privod_next_backend:8080;
        proxy_set_header Host $host;
    }

    # -------------------------------------------------------------------
    # SPA fallback: all other routes serve index.html
    # -------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------
    # Disable access to hidden files
    # -------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
