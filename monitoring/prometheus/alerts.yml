groups:
  - name: privod-backend
    rules:

      # -----------------------------------------------------------------------
      # Backend is down
      # -----------------------------------------------------------------------
      - alert: BackendDown
        expr: up{job="spring-boot-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "The Spring Boot backend has been unreachable for more than 1 minute."

      # -----------------------------------------------------------------------
      # HTTP 5xx error rate > 1%
      # -----------------------------------------------------------------------
      - alert: High5xxErrorRate
        expr: |
          (
            rate(http_server_requests_seconds_count{status=~"5.."}[5m])
            /
            rate(http_server_requests_seconds_count[5m])
          ) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 1% of HTTP requests are returning 5xx errors over the last 5 minutes."

      # -----------------------------------------------------------------------
      # DB connection pool usage > 80%
      # -----------------------------------------------------------------------
      - alert: DatabaseConnectionPoolHigh
        expr: |
          hikaricp_connections_active
          /
          hikaricp_connections_max
          > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HikariCP connection pool above 80% ({{ $value | humanizePercentage }})"
          description: "The database connection pool is more than 80% utilised. Risk of connection exhaustion."

  - name: infrastructure
    rules:

      # -----------------------------------------------------------------------
      # Disk usage > 80%
      # -----------------------------------------------------------------------
      - alert: DiskUsageHigh
        expr: |
          (node_filesystem_size_bytes{fstype!~"tmpfs|overlay"} - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"})
          /
          node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
          > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 80% on {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.mountpoint }} is {{ $value | humanizePercentage }} full."

      # -----------------------------------------------------------------------
      # Memory usage > 85%
      # -----------------------------------------------------------------------
      - alert: MemoryUsageHigh
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 85% ({{ $value | humanizePercentage }})"
          description: "Available memory has dropped below 15% of total RAM."

  - name: postgresql
    rules:

      # -----------------------------------------------------------------------
      # PostgreSQL is down
      # -----------------------------------------------------------------------
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter reports database is down"
          description: "The PostgreSQL instance is unreachable according to the exporter."
