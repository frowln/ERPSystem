spring:
  flyway:
    # Dev must use the same migration source-of-truth as other environments.
    # Keeping Flyway off + ddl-auto=update creates drift and breaks seed parity (RBAC, etc).
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.privod: TRACE
