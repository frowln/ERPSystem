server:
  port: ${PORT:8080}

spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:50}
      minimum-idle: ${DB_POOL_MIN:10}

  jpa:
    show-sql: false

app.cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    com.privod: INFO
    org.springframework.security: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
