server:
  port: 8080

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:development}
  traces-sample-rate: 0.1
  send-default-pii: false
  in-app-includes: com.privod.platform

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/privod2}
    username: ${DB_USERNAME:privod}
    password: ${DB_PASSWORD:privod_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    ignore-migration-patterns: '*:missing'
    validate-on-migrate: false

  mail:
    host: localhost
    port: ${MAIL_PORT:1025}
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        from: noreply@privod.ru

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 10GB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

app:
  api:
    version: ${API_VERSION:1.0.0}
  rate-limit:
    requests-per-minute: 600
    auth-requests-per-minute: 10
  scheduler:
    enabled: true
  pricing:
    minstroy:
      auto-import:
        enabled: ${PRICING_MINSTROY_AUTO_IMPORT_ENABLED:false}
        cron: ${PRICING_MINSTROY_AUTO_IMPORT_CRON:0 0 3 1 * *}
  integration:
    sync-check-interval-ms: 300000  # 5 minutes - check if 1C sync is due
    sbis-sync-interval-ms: 900000   # 15 minutes - SBIS document sync
  email:
    from-address: noreply@privod.ru
    from-name: "Привод - Строительная ERP"
    base-url: http://localhost:3000
  storage:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:19000}
    access-key: ${STORAGE_ACCESS_KEY:minio}
    secret-key: ${STORAGE_SECRET_KEY:minio_dev}
    bucket: ${STORAGE_BUCKET:privod-uploads}
  encryption:
    field-key: ${FIELD_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_256_BIT_SECRET_KEY_HERE}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  yookassa:
    shop-id: ${YOOKASSA_SHOP_ID:}
    secret-key: ${YOOKASSA_SECRET_KEY:}
    return-url: ${YOOKASSA_RETURN_URL:http://localhost:4000/settings/subscription/result?payment=success}
    webhook-secret: ${YOOKASSA_WEBHOOK_SECRET:}
  dadata:
    token: ${DADATA_TOKEN:}
  ai:
    provider: openai
    api-key: ${AI_API_KEY:}
    model: gpt-4o-mini
    max-tokens: 4096
    temperature: 0.7
    system-prompt: |
      Ты — AI-ассистент строительной платформы «Привод». Ты помогаешь пользователям с:
      - Управлением проектами, задачами, контрактами
      - Финансовым учётом и бюджетированием
      - Снабжением и складским учётом
      - Охраной труда и техникой безопасности
      - Кадровым учётом
      - Документооборотом
      Отвечай на русском языке. Будь конкретным и полезным.
      Когда пользователь задаёт вопрос о данных платформы (проекты, задачи, контракты, сотрудники, бюджеты),
      ты получишь контекст из базы данных — используй его для точных ответов.
      Если данных недостаточно, скажи об этом честно.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

app.cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

logging:
  level:
    com.privod: ${LOG_LEVEL:DEBUG}
    com.privod.platform: INFO
    com.privod.platform.infrastructure.web.RequestLoggingFilter: ${REQUEST_LOG_LEVEL:DEBUG}
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    com.privod.platform.modules.kep.service.BouncyCastleCryptoProvider: ERROR
    org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl: ERROR

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
