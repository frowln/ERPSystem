server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/privod_next}
    username: ${DB_USERNAME:privod}
    password: ${DB_PASSWORD:privod_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
        from: noreply@privod.ru

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

app:
  rate-limit:
    requests-per-minute: 100
    auth-requests-per-minute: 10
  scheduler:
    enabled: true
  integration:
    sync-check-interval-ms: 300000  # 5 minutes - check if 1C sync is due
    sbis-sync-interval-ms: 900000   # 15 minutes - SBIS document sync
  email:
    from-address: noreply@privod.ru
    from-name: "Привод - Строительная ERP"
    base-url: http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_256_BIT_SECRET_KEY_HERE}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  ai:
    provider: openai
    api-key: ${AI_API_KEY:}
    model: gpt-4o-mini
    max-tokens: 4096
    temperature: 0.7
    system-prompt: |
      Ты — AI-ассистент строительной платформы «Привод». Ты помогаешь пользователям с:
      - Управлением проектами, задачами, контрактами
      - Финансовым учётом и бюджетированием
      - Снабжением и складским учётом
      - Охраной труда и техникой безопасности
      - Кадровым учётом
      - Документооборотом
      Отвечай на русском языке. Будь конкретным и полезным.
      Когда пользователь задаёт вопрос о данных платформы (проекты, задачи, контракты, сотрудники, бюджеты),
      ты получишь контекст из базы данных — используй его для точных ответов.
      Если данных недостаточно, скажи об этом честно.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

app.cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

logging:
  level:
    com.privod: ${LOG_LEVEL:DEBUG}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
