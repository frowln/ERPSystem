<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/base-layout :: *}">
<body>
<div th:fragment="content">

    <h2 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 600; color: #1a1a1a;">
        Задача просрочена
    </h2>

    <p style="margin: 0 0 20px 0; font-size: 15px; color: #4a4a4a;">
        Задача, назначенная на вас, не была выполнена в установленный срок.
        Пожалуйста, обновите статус или свяжитесь с руководителем проекта.
    </p>

    <!-- Alert badge -->
    <div style="background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 6px; padding: 12px 16px; margin-bottom: 24px;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
            <tr>
                <td style="font-size: 14px; color: #721c24;">
                    <strong>Просрочено на:</strong>
                    <span th:text="${overdueDays + ' дн.'}" style="font-size: 18px; font-weight: 700;">3 дн.</span>
                </td>
            </tr>
        </table>
    </div>

    <!-- Task details -->
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%"
           style="background-color: #f8f9fa; border-radius: 6px; margin-bottom: 24px;">
        <tr>
            <td style="padding: 16px 20px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                    <tr>
                        <td style="padding: 6px 0; font-size: 13px; color: #6c757d; width: 140px;">Задача:</td>
                        <td style="padding: 6px 0; font-size: 14px; font-weight: 600; color: #1a1a1a;" th:text="${taskName}">Монтаж каркаса</td>
                    </tr>
                    <tr>
                        <td style="padding: 6px 0; font-size: 13px; color: #6c757d;">Проект:</td>
                        <td style="padding: 6px 0; font-size: 14px; color: #1a1a1a;" th:text="${projectName}">ЖК Солнечный</td>
                    </tr>
                    <tr>
                        <td style="padding: 6px 0; font-size: 13px; color: #6c757d;">Срок выполнения:</td>
                        <td style="padding: 6px 0; font-size: 14px; color: #dc3545; font-weight: 600;" th:text="${dueDate}">10.02.2025</td>
                    </tr>
                    <tr>
                        <td style="padding: 6px 0; font-size: 13px; color: #6c757d;">Ответственный:</td>
                        <td style="padding: 6px 0; font-size: 14px; color: #1a1a1a;" th:text="${assigneeName}">Петров П.П.</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <!-- Action buttons -->
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 8px 0;">
                <a th:href="${baseUrl + '/tasks/' + taskId}"
                   style="display: inline-block; background-color: #1a56db; color: #ffffff; font-size: 14px; font-weight: 600; text-decoration: none; padding: 12px 32px; border-radius: 6px; margin-right: 8px;">
                    Открыть задачу
                </a>
            </td>
        </tr>
    </table>

</div>
</body>
</html>
